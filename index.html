<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Outdoor Gazebo Scene</title>
  <script src="aframe.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    #info {
      position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.55); color: #fff;
      padding: 8px 20px; border-radius: 20px;
      font-family: Georgia, serif; font-size: 14px;
      pointer-events: none; z-index: 10;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>


  <a-scene background="color: #87CEEB" fog="type: linear; color: #c9e8f5; near: 30; far: 80">

    <!-- ═══════════════════ CAMERA ═══════════════════ -->
    <a-camera position="0 1.6 9" look-controls wasd-controls>
      <a-cursor color="#ffffff" opacity="0.7"></a-cursor>
    </a-camera>

    <!-- ═══════════════════ LIGHTING ═══════════════════ -->
    <a-light type="ambient" color="#e8f4ff" intensity="0.7"></a-light>
    <a-light type="directional" color="#fff8e0" intensity="1.0"
             position="6 14 8" cast-shadow="true"></a-light>
    <a-light type="directional" color="#d0e8ff" intensity="0.3"
             position="-5 8 -5"></a-light>

    <!-- ═══════════════════ GROUND ═══════════════════ -->
    <!-- Main grass plane -->
    <a-plane position="0 0 0" rotation="-90 0 0" width="60" height="60"
             color="#4a8c3f" material="roughness:1; metalness:0"></a-plane>
    <!-- Darker inner ground ring -->
    <a-plane position="0 0.01 0" rotation="-90 0 0" width="20" height="20"
             color="#3d7a34"></a-plane>

    <!-- ═══════════════════ GRASS TUFTS (patches) ═══════════════════ -->
    <!-- Scattered grass patches using thin boxes -->
    <a-entity id="grass-patches">
      <!-- Left side patches -->
      <a-box position="-6 0.15 4"   width="0.4" height="0.3" depth="0.1" color="#2d6e25" rotation="0 20 0"></a-box>
      <a-box position="-6.2 0.15 4" width="0.3" height="0.35" depth="0.1" color="#3a7a2f" rotation="0 -10 0"></a-box>
      <a-box position="-7 0.15 2"   width="0.4" height="0.28" depth="0.1" color="#2d6e25" rotation="0 45 0"></a-box>
      <a-box position="-5 0.15 0"   width="0.35" height="0.3" depth="0.1" color="#3a7a2f" rotation="0 30 0"></a-box>
      <a-box position="-8 0.15 -1"  width="0.4" height="0.32" depth="0.1" color="#2d6e25" rotation="0 -20 0"></a-box>
      <a-box position="-4 0.15 -3"  width="0.3" height="0.28" depth="0.1" color="#3a7a2f" rotation="0 55 0"></a-box>
      <!-- Right side patches -->
      <a-box position="6 0.15 4"    width="0.4" height="0.3" depth="0.1" color="#2d6e25" rotation="0 -20 0"></a-box>
      <a-box position="6.2 0.15 4"  width="0.3" height="0.35" depth="0.1" color="#3a7a2f" rotation="0 10 0"></a-box>
      <a-box position="7 0.15 2"    width="0.4" height="0.28" depth="0.1" color="#2d6e25" rotation="0 -45 0"></a-box>
      <a-box position="5 0.15 0"    width="0.35" height="0.3" depth="0.1" color="#3a7a2f" rotation="0 -30 0"></a-box>
      <a-box position="8 0.15 -1"   width="0.4" height="0.32" depth="0.1" color="#2d6e25" rotation="0 20 0"></a-box>
      <a-box position="4 0.15 -3"   width="0.3" height="0.28" depth="0.1" color="#3a7a2f" rotation="0 -55 0"></a-box>
    </a-entity>

    <!-- ═══════════════════ STEPPING STONE PATH ═══════════════════ -->
    <!-- Path from foreground (z=7) to gazebo entrance (z=1.5) -->
    <a-box position="0 0.04 6.5"  width="0.7" height="0.07" depth="1.1" color="#b0a090" material="roughness:1"></a-box>
    <a-box position="0 0.04 5.1"  width="0.7" height="0.07" depth="1.1" color="#a89880" material="roughness:1"></a-box>
    <a-box position="0 0.04 3.7"  width="0.7" height="0.07" depth="1.1" color="#b0a090" material="roughness:1"></a-box>
    <a-box position="0 0.04 2.3"  width="0.7" height="0.07" depth="1.1" color="#a89880" material="roughness:1"></a-box>

    <!-- ═══════════════════ GAZEBO ═══════════════════ -->
    <!-- Raised platform / floor -->
    <a-cylinder position="0 0.1 0" radius="2.8" height="0.2"
                color="#d4c4a8" material="roughness:0.9"></a-cylinder>

    <!-- 6 pillars arranged in a circle radius ~2.3 -->
    <a-entity id="gazebo-pillars">
      <!-- Pillar 1: front-left -->
      <a-cylinder position="-1.99 1.3 1.15" radius="0.13" height="2.6" color="#e8dcc8"></a-cylinder>
      <!-- Pillar 2: front-right -->
      <a-cylinder position=" 1.99 1.3 1.15" radius="0.13" height="2.6" color="#e8dcc8"></a-cylinder>
      <!-- Pillar 3: left -->
      <a-cylinder position="-2.3 1.3 0"     radius="0.13" height="2.6" color="#e8dcc8"></a-cylinder>
      <!-- Pillar 4: right -->
      <a-cylinder position=" 2.3 1.3 0"     radius="0.13" height="2.6" color="#e8dcc8"></a-cylinder>
      <!-- Pillar 5: back-left -->
      <a-cylinder position="-1.99 1.3 -1.15" radius="0.13" height="2.6" color="#e8dcc8"></a-cylinder>
      <!-- Pillar 6: back-right -->
      <a-cylinder position=" 1.99 1.3 -1.15" radius="0.13" height="2.6" color="#e8dcc8"></a-cylinder>
    </a-entity>

    <!-- Gazebo roof (cone) -->
    <a-cone position="0 3.5 0" radius-bottom="2.9" radius-top="0.1" height="1.6"
            color="#c0392b" material="roughness:0.8; side:double"></a-cone>
    <!-- Roof underside / ceiling ring -->
    <a-cylinder position="0 2.6 0" radius="2.75" height="0.12"
                color="#d4c4a8" material="roughness:0.9; side:double"></a-cylinder>
    <!-- Roof finial / spire top -->
    <a-sphere position="0 4.35 0" radius="0.15" color="#8B6914"></a-sphere>

    <!-- ═══════════════════ TABLE ═══════════════════ -->
    <!-- Table top -->
    <a-cylinder position="0 0.82 -0.3" radius="0.75" height="0.07"
                color="#8B6914" material="roughness:0.7"></a-cylinder>
    <!-- Table leg (single pedestal) -->
    <a-cylinder position="0 0.45 -0.3" radius="0.1" height="0.65"
                color="#7a5c10"></a-cylinder>
    <!-- Table foot -->
    <a-cylinder position="0 0.12 -0.3" radius="0.35" height="0.07"
                color="#7a5c10"></a-cylinder>

    <!-- ═══════════════════ CHAIRS ═══════════════════ -->
    <!-- Chair 1 — left of table -->
    <a-entity position="-1.05 0 -0.3" rotation="0 90 0">
      <a-box position="0 0.4 0"    width="0.55" height="0.07" depth="0.5"  color="#5c3d11"></a-box><!-- seat -->
      <a-box position="0 0.75 -0.22" width="0.55" height="0.65" depth="0.07" color="#5c3d11"></a-box><!-- back -->
      <a-cylinder position="-0.2 0.2 0.18" radius="0.035" height="0.4" color="#4a3008"></a-cylinder>
      <a-cylinder position=" 0.2 0.2 0.18" radius="0.035" height="0.4" color="#4a3008"></a-cylinder>
      <a-cylinder position="-0.2 0.2 -0.18" radius="0.035" height="0.4" color="#4a3008"></a-cylinder>
      <a-cylinder position=" 0.2 0.2 -0.18" radius="0.035" height="0.4" color="#4a3008"></a-cylinder>
    </a-entity>
    <!-- Chair 2 — right of table -->
    <a-entity position="1.05 0 -0.3" rotation="0 -90 0">
      <a-box position="0 0.4 0"    width="0.55" height="0.07" depth="0.5"  color="#5c3d11"></a-box>
      <a-box position="0 0.75 -0.22" width="0.55" height="0.65" depth="0.07" color="#5c3d11"></a-box>
      <a-cylinder position="-0.2 0.2 0.18" radius="0.035" height="0.4" color="#4a3008"></a-cylinder>
      <a-cylinder position=" 0.2 0.2 0.18" radius="0.035" height="0.4" color="#4a3008"></a-cylinder>
      <a-cylinder position="-0.2 0.2 -0.18" radius="0.035" height="0.4" color="#4a3008"></a-cylinder>
      <a-cylinder position=" 0.2 0.2 -0.18" radius="0.035" height="0.4" color="#4a3008"></a-cylinder>
    </a-entity>

    <!-- ═══════════════════ TABLE ITEMS ═══════════════════ -->
    <!-- MILO TIN (dark green cylinder with brown top) -->
    <a-entity position="-0.25 0.86 -0.3">
      <a-cylinder position="0 0.1 0" radius="0.08" height="0.22" color="#1b5e20"
                  material="roughness:0.4; metalness:0.3"></a-cylinder><!-- body -->
      <a-cylinder position="0 0.22 0" radius="0.085" height="0.04" color="#4e342e"
                  material="roughness:0.5"></a-cylinder><!-- lid -->
      <!-- Milo label band -->
      <a-cylinder position="0 0.1 0" radius="0.082" height="0.1" color="#2e7d32"
                  material="roughness:0.6; metalness:0.2"></a-cylinder>
    </a-entity>

    <!-- MILK TIN (white/silver cylinder) -->
    <a-entity position="0.25 0.86 -0.3">
      <a-cylinder position="0 0.09 0" radius="0.075" height="0.18" color="#eceff1"
                  material="roughness:0.3; metalness:0.4"></a-cylinder><!-- body -->
      <a-cylinder position="0 0.19 0" radius="0.078" height="0.03" color="#90a4ae"
                  material="roughness:0.4; metalness:0.5"></a-cylinder><!-- lid -->
      <!-- Red label band -->
      <a-cylinder position="0 0.09 0" radius="0.077" height="0.07" color="#e53935"
                  material="roughness:0.6"></a-cylinder>
    </a-entity>

    <!-- CUP 1 -->
    <a-entity position="-0.1 0.86 -0.62">
      <a-cylinder position="0 0.055 0" radius="0.055" height="0.11" color="#f5f5f5"
                  material="roughness:0.3; metalness:0.1; side:double"></a-cylinder>
      <a-torus position="0 0.055 0" radius="0.065" radius-tubular="0.008"
               rotation="0 0 90" color="#e0e0e0"></a-torus><!-- handle approximation -->
    </a-entity>

    <!-- CUP 2 -->
    <a-entity position="0.1 0.86 -0.62">
      <a-cylinder position="0 0.055 0" radius="0.055" height="0.11" color="#f5f5f5"
                  material="roughness:0.3; metalness:0.1; side:double"></a-cylinder>
      <a-torus position="0 0.055 0" radius="0.065" radius-tubular="0.008"
               rotation="0 0 90" color="#e0e0e0"></a-torus>
    </a-entity>

    <!-- ═══════════════════ CURVED DECORATIVE WALLS ═══════════════════ -->
    <!-- Simulate a curved enclosure behind the gazebo using many short wall segments -->
    <!-- Arc of 14 segments, radius ~6, spanning ~210° behind the gazebo -->
    <a-entity id="curved-walls">
      <!-- Each segment: box rotated to approximate a circle arc -->
      <a-box position="-5.78 1.0 -2.10" rotation="0  15 0" width="1.5" height="2.0" depth="0.2" color="#e8e0d0"></a-box>
      <a-box position="-5.21 1.0 -3.29" rotation="0  30 0" width="1.5" height="2.0" depth="0.2" color="#ddd5c5"></a-box>
      <a-box position="-4.15 1.0 -4.33" rotation="0  45 0" width="1.5" height="2.0" depth="0.2" color="#e8e0d0"></a-box>
      <a-box position="-2.76 1.0 -5.09" rotation="0  60 0" width="1.5" height="2.0" depth="0.2" color="#ddd5c5"></a-box>
      <a-box position="-1.17 1.0 -5.61" rotation="0  75 0" width="1.5" height="2.0" depth="0.2" color="#e8e0d0"></a-box>
      <a-box position=" 0.00 1.0 -5.80" rotation="0  90 0" width="1.5" height="2.0" depth="0.2" color="#ddd5c5"></a-box>
      <a-box position=" 1.17 1.0 -5.61" rotation="0 105 0" width="1.5" height="2.0" depth="0.2" color="#e8e0d0"></a-box>
      <a-box position=" 2.76 1.0 -5.09" rotation="0 120 0" width="1.5" height="2.0" depth="0.2" color="#ddd5c5"></a-box>
      <a-box position=" 4.15 1.0 -4.33" rotation="0 135 0" width="1.5" height="2.0" depth="0.2" color="#e8e0d0"></a-box>
      <a-box position=" 5.21 1.0 -3.29" rotation="0 150 0" width="1.5" height="2.0" depth="0.2" color="#ddd5c5"></a-box>
      <a-box position=" 5.78 1.0 -2.10" rotation="0 165 0" width="1.5" height="2.0" depth="0.2" color="#e8e0d0"></a-box>
      <!-- Wall caps / pillars at wall joints -->
      <a-cylinder position="-6.0 1.0 -1.5"  radius="0.15" height="2.2" color="#c8c0b0"></a-cylinder>
      <a-cylinder position="-5.6 1.0 -3.8"  radius="0.15" height="2.2" color="#c8c0b0"></a-cylinder>
      <a-cylinder position="-3.0 1.0 -5.6"  radius="0.15" height="2.2" color="#c8c0b0"></a-cylinder>
      <a-cylinder position=" 0.0 1.0 -6.0"  radius="0.15" height="2.2" color="#c8c0b0"></a-cylinder>
      <a-cylinder position=" 3.0 1.0 -5.6"  radius="0.15" height="2.2" color="#c8c0b0"></a-cylinder>
      <a-cylinder position=" 5.6 1.0 -3.8"  radius="0.15" height="2.2" color="#c8c0b0"></a-cylinder>
      <a-cylinder position=" 6.0 1.0 -1.5"  radius="0.15" height="2.2" color="#c8c0b0"></a-cylinder>
      <!-- Wall top coping strip -->
      <a-box position="-5.78 2.05 -2.10" rotation="0  15 0" width="1.52" height="0.12" depth="0.28" color="#c8c0b0"></a-box>
      <a-box position="-5.21 2.05 -3.29" rotation="0  30 0" width="1.52" height="0.12" depth="0.28" color="#c8c0b0"></a-box>
      <a-box position="-4.15 2.05 -4.33" rotation="0  45 0" width="1.52" height="0.12" depth="0.28" color="#c8c0b0"></a-box>
      <a-box position="-2.76 2.05 -5.09" rotation="0  60 0" width="1.52" height="0.12" depth="0.28" color="#c8c0b0"></a-box>
      <a-box position="-1.17 2.05 -5.61" rotation="0  75 0" width="1.52" height="0.12" depth="0.28" color="#c8c0b0"></a-box>
      <a-box position=" 0.00 2.05 -5.80" rotation="0  90 0" width="1.52" height="0.12" depth="0.28" color="#c8c0b0"></a-box>
      <a-box position=" 1.17 2.05 -5.61" rotation="0 105 0" width="1.52" height="0.12" depth="0.28" color="#c8c0b0"></a-box>
      <a-box position=" 2.76 2.05 -5.09" rotation="0 120 0" width="1.52" height="0.12" depth="0.28" color="#c8c0b0"></a-box>
      <a-box position=" 4.15 2.05 -4.33" rotation="0 135 0" width="1.52" height="0.12" depth="0.28" color="#c8c0b0"></a-box>
      <a-box position=" 5.21 2.05 -3.29" rotation="0 150 0" width="1.52" height="0.12" depth="0.28" color="#c8c0b0"></a-box>
      <a-box position=" 5.78 2.05 -2.10" rotation="0 165 0" width="1.52" height="0.12" depth="0.28" color="#c8c0b0"></a-box>
    </a-entity>

    <!-- ═══════════════════ TREES ═══════════════════ -->
    <!-- Tree macro: trunk (cylinder) + canopy layers (cones) -->
    <!-- Tree 1: front-left -->
    <a-entity position="-4.5 0 4.5">
      <a-cylinder position="0 0.7 0" radius="0.18" height="1.4" color="#6d4c41"></a-cylinder>
      <a-cone position="0 2.2 0" radius-bottom="1.0" radius-top="0.05" height="1.6" color="#2e7d32"></a-cone>
      <a-cone position="0 3.1 0" radius-bottom="0.75" radius-top="0.05" height="1.4" color="#388e3c"></a-cone>
      <a-cone position="0 3.9 0" radius-bottom="0.5" radius-top="0.05" height="1.1" color="#43a047"></a-cone>
    </a-entity>
    <!-- Tree 2: front-right -->
    <a-entity position="4.5 0 4.5">
      <a-cylinder position="0 0.7 0" radius="0.18" height="1.4" color="#6d4c41"></a-cylinder>
      <a-cone position="0 2.2 0" radius-bottom="1.0" radius-top="0.05" height="1.6" color="#2e7d32"></a-cone>
      <a-cone position="0 3.1 0" radius-bottom="0.75" radius-top="0.05" height="1.4" color="#388e3c"></a-cone>
      <a-cone position="0 3.9 0" radius-bottom="0.5" radius-top="0.05" height="1.1" color="#43a047"></a-cone>
    </a-entity>
    <!-- Tree 3: left-far -->
    <a-entity position="-8 0 -0.5">
      <a-cylinder position="0 0.9 0" radius="0.22" height="1.8" color="#5d4037"></a-cylinder>
      <a-cone position="0 2.7 0" radius-bottom="1.2" radius-top="0.05" height="1.8" color="#1b5e20"></a-cone>
      <a-cone position="0 3.8 0" radius-bottom="0.85" radius-top="0.05" height="1.5" color="#2e7d32"></a-cone>
      <a-cone position="0 4.7 0" radius-bottom="0.55" radius-top="0.05" height="1.2" color="#388e3c"></a-cone>
    </a-entity>
    <!-- Tree 4: right-far -->
    <a-entity position="8 0 -0.5">
      <a-cylinder position="0 0.9 0" radius="0.22" height="1.8" color="#5d4037"></a-cylinder>
      <a-cone position="0 2.7 0" radius-bottom="1.2" radius-top="0.05" height="1.8" color="#1b5e20"></a-cone>
      <a-cone position="0 3.8 0" radius-bottom="0.85" radius-top="0.05" height="1.5" color="#2e7d32"></a-cone>
      <a-cone position="0 4.7 0" radius-bottom="0.55" radius-top="0.05" height="1.2" color="#388e3c"></a-cone>
    </a-entity>
    <!-- Shrub bushes: small sphere clusters -->
    <a-sphere position="-3 0.35 2.5" radius="0.45" color="#33691e"></a-sphere>
    <a-sphere position="-3.6 0.3 2.5" radius="0.35" color="#558b2f"></a-sphere>
    <a-sphere position="3 0.35 2.5"   radius="0.45" color="#33691e"></a-sphere>
    <a-sphere position="3.6 0.3 2.5"  radius="0.35" color="#558b2f"></a-sphere>
    <!-- Back wall shrubs -->
    <a-sphere position="-4 0.4 -3.2"  radius="0.5" color="#2e7d32"></a-sphere>
    <a-sphere position="-4.7 0.3 -3"  radius="0.35" color="#43a047"></a-sphere>
    <a-sphere position=" 4 0.4 -3.2"  radius="0.5" color="#2e7d32"></a-sphere>
    <a-sphere position=" 4.7 0.3 -3"  radius="0.35" color="#43a047"></a-sphere>

    <!-- ═══════════════════ LAMP POSTS ═══════════════════ -->
    <!-- 4 lamps around the gazebo at cardinal diagonals -->
    <!-- Lamp helper macro: pole + arm + globe -->
    <!-- Lamp A: front-left -->
    <a-entity position="-3.2 0 2.8">
      <a-cylinder position="0 1.5 0"    radius="0.05" height="3.0"    color="#37474f"></a-cylinder>
      <a-box      position="0 3.1 0.18" width="0.05"  height="0.05" depth="0.4"    color="#37474f"></a-box>
      <a-sphere   position="0 3.15 0.38" radius="0.15" color="#fff9c4"
                  material="emissive:#ffe082; emissiveIntensity:0.9; roughness:0.2"></a-sphere>
      <a-cylinder position="0 0.05 0"   radius="0.12" height="0.1"    color="#263238"></a-cylinder>
    </a-entity>
    <!-- Lamp B: front-right -->
    <a-entity position="3.2 0 2.8">
      <a-cylinder position="0 1.5 0"    radius="0.05" height="3.0"    color="#37474f"></a-cylinder>
      <a-box      position="0 3.1 0.18" width="0.05"  height="0.05" depth="0.4"    color="#37474f"></a-box>
      <a-sphere   position="0 3.15 0.38" radius="0.15" color="#fff9c4"
                  material="emissive:#ffe082; emissiveIntensity:0.9; roughness:0.2"></a-sphere>
      <a-cylinder position="0 0.05 0"   radius="0.12" height="0.1"    color="#263238"></a-cylinder>
    </a-entity>
    <!-- Lamp C: back-left -->
    <a-entity position="-3.2 0 -3.0">
      <a-cylinder position="0 1.5 0"    radius="0.05" height="3.0"    color="#37474f"></a-cylinder>
      <a-box      position="0 3.1 0.18" width="0.05"  height="0.05" depth="0.4"    color="#37474f"></a-box>
      <a-sphere   position="0 3.15 0.38" radius="0.15" color="#fff9c4"
                  material="emissive:#ffe082; emissiveIntensity:0.9; roughness:0.2"></a-sphere>
      <a-cylinder position="0 0.05 0"   radius="0.12" height="0.1"    color="#263238"></a-cylinder>
    </a-entity>
    <!-- Lamp D: back-right -->
    <a-entity position="3.2 0 -3.0">
      <a-cylinder position="0 1.5 0"    radius="0.05" height="3.0"    color="#37474f"></a-cylinder>
      <a-box      position="0 3.1 0.18" width="0.05"  height="0.05" depth="0.4"    color="#37474f"></a-box>
      <a-sphere   position="0 3.15 0.38" radius="0.15" color="#fff9c4"
                  material="emissive:#ffe082; emissiveIntensity:0.9; roughness:0.2"></a-sphere>
      <a-cylinder position="0 0.05 0"   radius="0.12" height="0.1"    color="#263238"></a-cylinder>
    </a-entity>
    <!-- Lamp point lights (subtle warm glow) -->
    <a-light type="point" color="#ffe082" intensity="0.5" distance="5" position="-3.2 3.2 3.2"></a-light>
    <a-light type="point" color="#ffe082" intensity="0.5" distance="5" position=" 3.2 3.2 3.2"></a-light>
    <a-light type="point" color="#ffe082" intensity="0.4" distance="5" position="-3.2 3.2 -2.6"></a-light>
    <a-light type="point" color="#ffe082" intensity="0.4" distance="5" position=" 3.2 3.2 -2.6"></a-light>

    <!-- ═══════════════════ DECORATIVE STONES ═══════════════════ -->
